<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiTop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="container">
    <div class="sushi-top"></div>
    <nav class="auth">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li class="sinEmail"><a href="login.html">Login</a></li>
        <li class="sinEmail"><a href="register.html">Register</a></li>
      </ul>
    </nav>
    <div class="conEmail">
      <p class="saludo"></p>
      <p class="logOut">Logout</p>
    </div>
    <div class="logo">
          <a href="index.html" title="Home"><img src="img/logo.svg" alt=""></a>
    </div>
    <div class="searchbar">
      <form id="searchForm" class="searchbarform">
            <input type="text" id="searchbar" name="buscar" class="searchbar" placeholder="Buscar...">
            <button type="submit" class="indbutton buttonsearch">Buscar</button>
      </form>
    </div>
</header>
  <section class="usersec">
    <form action="./login.html" method="get" class="form_user registerForm">
        <h1>Regístrese.</h1>

        <div>
            <label for="regEmail">Escriba un mail existente</label>
            <input class="inputregi regEmail" id="regEmail" type="email" name="email" placeholder="Escriba un mail existente">
        </div>
        <p class="errorlogin errorEmail"></p>

        <div>
            <label for="regPassword">Nueva contraseña</label>
            <input class="inputregi regPassword" id="regPassword" type="password" name="password" placeholder="Nueva contraseña">
        </div>
        <p class="errorlogin errorPassword"></p>

        <div>
            <label for="regPassword2">Reescriba su contraseña</label>
            <input class="inputregi regPassword2" id="regPassword2" type="password" name="password2" placeholder="Reescriba su contraseña">
        </div>
        <p class="errorlogin errorPassword2"></p>

        <div>
            <input type="checkbox" class="regTerms" id="regTerms" name="terms">
            <label for="regTerms">Acepto términos y condiciones.</label>
        </div>
        <p class="errorlogin errorTerms"></p>

        <div>
            <button class="buttonregi" type="submit">Registrarme</button>
        </div>

        <a href="./login.html" class="acolor">Ya tengo una cuenta</a>
    </form>
</section>
    
<footer class="footer">
  <ul class="footer-ul">
    <li class="footer-li">NAHUEL ABRAHAM </li>
    <li class="footer-li">ALFREDO YABRAN </li>
    <li class="footer-li">FEDERICO CHORNY</li>
  </ul>
    
</footer>

<script src="./js/register.js"></script>
<script src="./js/saludo.js"></script>
<script src="./js/logout.js"></script>
</body>
</html>
