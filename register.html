  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiTop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="container">
    <div class="sushi-top"></div>
    <div class="logo">
          <img src="img/logo.svg" alt="">
    </div>
    <div class="searchbar">
      <form id="searchForm" action="./search-result.html" method="get" class="searchbarform">
            <input type="text" id="searchbar" name="buscar" class="searchbar" placeholder="Buscar...">
            <button class="indbutton" type="submit" class="buttonsearch">Buscar</button>
      </form>
    </div>
    <div class="auth">
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
     </div>
  <nav>
    <ul class="menu">
      <li><a href="index.html">HOME</a></li>
      <li><a href="about.html">QUIENES</a></li>
      <li><a href="contact.html">CONTACTO</a></li>
    </ul>
  </nav>
</header>
  <section class="usersec">
    <form action="./index.html" method="get" class="form_user registerForm">
        <h1>Regístrese.</h1>

        <div>
            <label for="reg-email">Escriba un mail existente</label>
            <input class="inputregi reg-email" type="email" name="email" placeholder="Escriba un mail existente">
        </div>
        <p class="errorlogin errorEmail"></p>

        <div>
            <label for="reg-password">Nueva contraseña</label>
            <input class="inputregi reg-password" type="password" name="password" placeholder="Nueva contraseña">
        </div>
        <p class="errorlogin errorPassword"></p>

        <div>
            <label for="reg-password2">Reescriba su contraseña</label>
            <input class="inputregi reg-password2" type="password" name="password2" placeholder="Reescriba su contraseña">
        </div>
        <p class="errorlogin errorPassword2"></p>

        <div>
            <input type="checkbox" class="reg-terms" name="terms">
            <label for="reg-terms">Acepto términos y condiciones.</label>
        </div>
        <p class="errorlogin errorTerms"></p>

        <div>
            <button class="buttonregi" type="submit">Registrarme</button>
        </div>

        <a href="./login.html" class="acolor">Ya tengo una cuenta</a>
    </form>
</section>
    
     <footer>
        <p>NAHUEL ABRAHAM, ALFREDO YABRAN, FEDERICO CHORNY</p>
    </footer>
  </body>
</html>
