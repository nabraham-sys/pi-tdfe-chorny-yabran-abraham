<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SushiTop</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
  <header class="container">
    <div class="sushi-top"></div>
    <nav class="auth">
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
      <ul class="sinEmail">
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
    <div class="conEmail">
      <p class="saludo"></p>
      <p class="logOut">Logout</p>
    </div>
    <div class="logo">
          <a href="index.html"><img src="img/logo.svg" alt="SushiTop logo"></a>
    </div>
    <div class="searchbar">
      <form id="searchForm" class="searchbarform">
            <input type="text" id="searchbar" name="buscar" class="searchbar" placeholder="Buscar...">
            <button type="submit" class="indbutton buttonsearch">Buscar</button>
      </form>
    </div>
  </header>

  <div class="categorysec">
    <main class="mainCategory">
      <aside class="categorynav">
        <ul class="categoryul">
        </ul>
      </aside>

      <div class="product-wrapper">
        <div class="product-container">
          <h1></h1>
          <p class="tags"></p>
          <img src="" alt="" />
        </div>
        <div class="product-info">
          <p class="precio" id="precio"></p>
          <p id="marca"></p>
          <p>Categoría: <a id="categoria" href="./category.html"></a></p>
          <p id="descripcion"></p>
          <p id="stock"></p>
        </div>

        <div class="product-info containerReviews">
          <h2>Feedback / Reviews</h2>
        </div>
      </div>
    </main>
  </div>

<footer class="footer">
  <ul class="footer-ul">
    <li class="footer-li">NAHUEL ABRAHAM </li>
    <li class="footer-li">ALFREDO YABRAN </li>
    <li class="footer-li">FEDERICO CHORNY</li>
  </ul>
</footer>

<script src="./js/product.js"></script>
<script src="./js/saludo.js"></script>
<script src="./js/logout.js"></script>

  </body>
</html>
