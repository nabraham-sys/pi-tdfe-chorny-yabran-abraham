<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiTop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="container">
    <div class="sushi-top"></div>
        </div>
    <div class="auth">
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
     </div>
    <div class="logo">
          <a href="index.html"><img src="img/logo.svg" alt=""></a>
    </div>
    <div class="searchbar">
      <form id="searchForm" action="./search-result.html" method="get" class="searchbarform">
            <input type="text" id="searchbar" name="buscar" class="searchbar" placeholder="Buscar...">
            <button type="submit" class="indbutton buttonsearch">Buscar</button>
      </form>
</header>
<section class="usersec">
    <form action="./index.html" method="get" class="form_user loginForm" novalidate>
        <h1>Iniciar sesion.</h1>

        <div>
            <label for="email">Escriba su email:</label>
            <input class="inputregi email" type="email" name="email" placeholder="Escriba un mail existente">
        </div>
        <p class="errorlogin errorEmail"></p>

        <div>
            <label for="contraseña">Escriba su contraseña</label>
            <input class="inputregi contraseña" type="password" name="contraseña" placeholder="Escriba su contraseña">
        </div>
        <p class="errorlogin errorPassword"></p>

        <div>
            <button class="buttonregi" type="submit">Ingresar</button>
        </div>
        
        <a href="./register.html" class="acolor">No tengo cuenta</a>
    </form>
 </section>
<footer>
  <ul>
    <li>NAHUEL ABRAHAM </li>
    <li>ALFREDO YABRAN </li>
    <li>FEDERICO CHORNY</li>
  </ul>
    
</footer>
</body>
</html>
